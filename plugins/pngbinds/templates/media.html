{% extends "base.html" %}
{% block styles %}
<link rel="stylesheet" type="text/css" href="/static/pngbinds/css/media.css">
{% endblock %}
{% block scripts %}
<script src="/static/pngbinds/js/mediautil.js"></script>
<script src="/static/pngbinds/js/media.js"></script>
{% endblock %}
{% block body %}
<h1>PNGBinds Media Editor</h1>
<h2>Upload</h2>
<div id="media-upload">
    <div><span>Name</span><input id="upload-name"></div>
    <div>
        <span>Type</span>
        <select id="upload-type">
            <option value="image" selected>image</option>
            <option value="iframe">iframe</option>
        </select>
    </div>
    <div id="image-input"><input id="upload-image-input" type="file" accept="image/*"> <img id="upload-image-preview" class="media-image"></div>
    <div id="iframe-input"><span>IFrame URL</span><input id="upload-iframe-input" type="url"> <iframe id="upload-iframe-preview" class="media-iframe"></iframe></div>
    <div><button id="upload-button">Upload</button></div>
</div>
<h2>Media List</h2>
<div id="media-container">
</div>
{% endblock %}
