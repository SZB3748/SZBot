{% extends "base.html" %}
{% block styles %}
<link rel="stylesheet" type="text/css" href="/static/pngbinds/css/media.css">
{% endblock %}
{% block scripts %}
<script src="/static/pngbinds/js/mediautil.js"></script>
<script src="/static/pngbinds/js/media.js"></script>
{% endblock %}
{% block body %}
<h1>PNGBinds Media Editor</h1>
<h2>Upload</h2>
<div id="media-upload">
    <div><span>Name</span><input id="upload-name"></div>
    <div><input id="upload-input" type="file" accept="image/*,video/*"> <img id="upload-preview" class="media-image"></div>
    <div><button id="upload-button">Upload</button></div>
</div>
<h2>Media List</h2>
<div id="media-container">
</div>
{% endblock %}
